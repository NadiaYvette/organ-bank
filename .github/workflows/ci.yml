name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.14.1'
          cabal-version: '3.16.1.0'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.14.1-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.14.1-

      - name: Update cabal package index
        run: cabal update

      - name: Build all packages
        run: cabal build all

      - name: Run tests
        run: cabal test all

      - name: Build ghc-shim (GHC 9.14)
        run: cabal --project-file=cabal-ghc914.project build ghc-shim
