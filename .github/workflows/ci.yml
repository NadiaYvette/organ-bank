name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.14.1'
          cabal-version: '3.16.1.0'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.14.1-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.14.1-

      - name: Update cabal package index
        run: cabal update

      - name: Build all packages (-Werror)
        run: cabal build all --ghc-options=-Werror

      - name: Run tests
        run: cabal test all

      - name: Install hlint
        run: cabal install hlint --install-method=copy --overwrite-policy=always

      - name: Run hlint
        run: |
          find . -name '*.hs' -not -path './dist-newstyle/*' | xargs hlint --hint=.hlint.yaml || true

      - name: Build ghc-shim (GHC 9.14)
        run: cabal --project-file=cabal-ghc914.project build ghc-shim

      - name: Run frontend smoke tests
        run: |
          set -e
          run_fe() { echo "Testing $1..."; cabal -v0 run "$1" -- "$2" | cabal -v0 run organ-validate -- /dev/stdin; }
          run_fe sml-organ-fe     test/examples/hello.sml
          run_fe erlang-organ-fe  test/examples/hello.erl
          run_fe prolog-organ-fe  test/examples/hello.pl
          run_fe scheme-organ-fe  test/examples/hello.scm
          run_fe lua-organ-fe     test/examples/hello.lua
          run_fe forth-organ-fe   test/examples/hello.fth

      - name: Run integration tests
        env:
          CABAL: cabal
        run: bash test/integration-test.sh

      - name: Generate Haddock documentation
        run: cabal haddock organ-ir --haddock-html --haddock-hyperlink-source

      - name: Upload Haddock docs
        uses: actions/upload-artifact@v4
        with:
          name: haddock-docs
          path: dist-newstyle/build/*/ghc-*/organ-ir-*/doc/html/organ-ir/
